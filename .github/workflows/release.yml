name: release

# Runs only when a `v*` tag is pushed. Tagging itself is a manual step done
# by a human (git tag -a vX.Y.Z -m "..." && git push --tags) — this workflow
# never creates or pushes a tag on its own.
on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      # Build the dashboard SPA before tests and goreleaser: goreleaser's builds
      # embed internal/features/dashboard/ui/dist (go:embed all:ui/dist), so the
      # released binaries must be produced from a fresh frontend build, not the
      # legacy fallback. The built index.html is gitignored (only ui/dist/.gitkeep
      # is tracked, and `emptyOutDir: false` keeps it), so the working tree stays
      # clean and goreleaser does not refuse a dirty repo.
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: internal/features/dashboard/ui/package-lock.json
      - name: Build frontend
        working-directory: internal/features/dashboard/ui
        run: |
          npm ci
          npm run build

      - name: Run tests
        run: go test ./...

      - uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: latest
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HOMEBREW_TAP_GITHUB_TOKEN: ${{ secrets.HOMEBREW_TAP_GITHUB_TOKEN }}
